<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potrivire Inteligentă - Premium Dating</title>
    <style>
        :root {
            --primary-color: #ff2d55;
            --secondary-color: #5856d6;
            --bg-color: #0b0e14;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .matching-container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* 雷达扫描动画 */
        .radar {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
            position: relative;
            background: repeating-radial-gradient(transparent, transparent 20px, rgba(255, 45, 85, 0.1) 20px, rgba(255, 45, 85, 0.1) 22px);
        }

        .radar::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            background: conic-gradient(from 0deg, transparent, var(--primary-color));
            border-radius: 50%;
            transform-origin: top left;
            animation: scan 2s linear infinite;
            opacity: 0.4;
        }

        @keyframes scan {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .avatar-match {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            background: #333;
            overflow: hidden;
            position: relative;
        }

        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .heart-icon {
            font-size: 30px;
            color: var(--primary-color);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        h2 { font-size: 24px; margin: 10px 0; }
        .status-text { color: #aaa; font-size: 14px; min-height: 20px; }

        /* 进度条 */
        .progress-box {
            width: 100%;
            height: 8px;
            background: #222;
            border-radius: 10px;
            margin: 25px 0;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            transition: width 0.3s;
        }

        .log-messages {
            text-align: left;
            font-size: 13px;
            color: #00ffcc;
            font-family: monospace;
            height: 60px;
            overflow: hidden;
        }

        .success-msg {
            display: none;
            color: #4cd964;
            font-weight: bold;
            font-size: 18px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="matching-container">
    <div class="avatar-match">
        <div class="avatar">
            <img src="https://i.pravatar.cc/150?u=me" alt="You">
        </div>
        <div class="heart-icon">❤️</div>
        <div class="avatar" id="partner-avatar">
            <img src="https://i.pravatar.cc/150?u=search" id="match-img" alt="Matching">
        </div>
    </div>

    <div class="radar"></div>

    <h2 id="main-title">Se caută parteneri...</h2>
    <p class="status-text" id="status">Se analizează profilurile din apropiere (București)</p>

    <div class="progress-box">
        <div class="progress-bar" id="pb"></div>
    </div>

    <div class="log-messages" id="logs"></div>

    <div class="success-msg" id="success">
        ✅ Potrivire Găsită! Se conectează...
    </div>
</div>

<script>
    const logs = [
        "> Se conectează la baza de date...",
        "> Filtrare după locație: România",
        "> Se verifică compatibilitatea...",
        "> 12 utilizatori activi găsiți...",
        "> Analiză interese comune...",
        "> Algoritmul BK caută cea mai bună opțiune...",
        "> Se verifică disponibilitatea...",
        "> Potrivire 98% confirmată!"
    ];

    const avatars = [
        "https://i.pravatar.cc/150?img=32",
        "https://i.pravatar.cc/150?img=45",
        "https://i.pravatar.cc/150?img=10",
        "https://i.pravatar.cc/150?img=26",
        "https://i.pravatar.cc/150?img=49"
    ];

    let progress = 0;
    let logIndex = 0;
    const pb = document.getElementById('pb');
    const status = document.getElementById('status');
    const logBox = document.getElementById('logs');
    const matchImg = document.getElementById('match-img');

    // 模拟头像轮播
    let avatarTimer = setInterval(() => {
        if(progress < 90) {
            matchImg.src = avatars[Math.floor(Math.random() * avatars.length)];
        }
    }, 500);

    // 核心匹配逻辑
    const interval = setInterval(() => {
        progress += Math.random() * 5;
        if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            clearInterval(avatarTimer);
            onMatchComplete();
        }
        pb.style.width = progress + "%";

        if(progress > logIndex * 12 && logIndex < logs.length) {
            const line = document.createElement('div');
            line.textContent = logs[logIndex];
            logBox.appendChild(line);
            logIndex++;
        }
    }, 400);

    function onMatchComplete() {
        document.getElementById('main-title').textContent = "Utilizator Găsit!";
        document.getElementById('status').textContent = "Redirecționare către chat securizat...";
        document.getElementById('success').style.display = "block";
        matchImg.src = "https://i.pravatar.cc/150?img=32"; // 最终匹配的模特头像

        // 延迟 3 秒后强制跳转
        setTimeout(() => {
            window.location.href = "https://wa.me/12678341019?text=Bună!%20Sunt%20interesat%20să%20te%20cunosc.";
        }, 3000);
    }
</script>

</body>
</html>
