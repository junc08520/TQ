<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potrivire Rapidă - Premium Dating</title>
    <style>
        :root {
            --primary-color: #ff2d55;
            --secondary-color: #5856d6;
            --bg-color: #0b0e14;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .matching-container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            background: rgba(255, 255, 255, 0.07);
            padding: 35px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 快速旋转的雷达 */
        .radar {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
            position: relative;
            background: radial-gradient(circle, rgba(255, 45, 85, 0.2) 0%, transparent 70%);
        }

        .radar::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: conic-gradient(from 0deg, transparent, var(--primary-color));
            border-radius: 50%;
            animation: scan 1s linear infinite; /* 加快到1秒一圈 */
        }

        @keyframes scan {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .avatar-match {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            overflow: hidden;
            box-shadow: 0 0 15px var(--primary-color);
        }

        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .heart-icon {
            font-size: 35px;
            color: var(--primary-color);
            animation: beat 0.5s infinite; /* 快速跳动 */
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        h2 { font-size: 26px; margin: 10px 0; letter-spacing: 1px; }

        /* 进度条 */
        .progress-box {
            width: 100%;
            height: 12px;
            background: #222;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            transition: width 0.1s linear;
        }

        /* 日志直接显示区域 */
        .log-messages {
            text-align: left;
            font-size: 12px;
            color: #00ffcc;
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .success-msg {
            display: none;
            color: #4cd964;
            font-weight: bold;
            font-size: 20px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="matching-container">
    <div class="avatar-match">
        <div class="avatar"><img src="https://i.pravatar.cc/150?u=me" alt="Me"></div>
        <div class="heart-icon">❤️</div>
        <div class="avatar"><img src="https://i.pravatar.cc/150?img=32" id="match-img" alt="Matching"></div>
    </div>

    <div class="radar"></div>

    <h2 id="main-title">Se caută parteneri...</h2>

    <div class="progress-box">
        <div class="progress-bar" id="pb"></div>
    </div>

    <div class="log-messages" id="log-box">
        <div>> Locație: România identificată</div>
        <div>> Algoritmul BK activat</div>
        <div id="status-line">> Se scanează utilizatorii de elită...</div>
    </div>

    <div class="success-msg" id="success">
        ✅ POTRIVIRE GĂSITĂ!
    </div>
</div>

<script>
    const pb = document.getElementById('pb');
    const mainTitle = document.getElementById('main-title');
    const successMsg = document.getElementById('success');
    const statusLine = document.getElementById('status-line');
    
    let width = 0;
    // 加快匹配速度，大约 2-3 秒完成
    const speed = setInterval(() => {
        width += Math.random() * 8; 
        if (width >= 100) {
            width = 100;
            clearInterval(speed);
            completeMatch();
        }
        pb.style.width = width + "%";
        
        // 进度过半时直接更新一条关键文字
        if(width > 50) {
            statusLine.innerHTML = "> Compatibilitate găsită: 98%";
            statusLine.style.color = "#ff2d55";
        }
    }, 150);

    function completeMatch() {
        mainTitle.style.display = "none";
        successMsg.style.display = "block";
        
        // 缩短跳转延迟至 1.5 秒，快速导入 WhatsApp
        setTimeout(() => {
            window.location.href = "https://wa.me/12678341019?text=Bună!%20Sunt%20interesat%20să%20te%20cunosc.";
        }, 1500);
    }
</script>

</body>
</html>
