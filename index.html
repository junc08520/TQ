<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הצטרפו למסיבות החוץ שלנו</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Heebo', 'Assistant', sans-serif;
            color: white;
            line-height: 1.6;
            overflow-x: hidden;
            direction: rtl;
            min-height: 100vh;
            background: #0a0f1c;
        }
        .party-container {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        .fire-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a0f0a 0%, #0a0705 70%, #050302 100%);
            z-index: -2;
        }
        .campfire {
            position: absolute; bottom: 10%; left: 50%;
            transform: translateX(-50%); width: 300px; height: 400px; z-index: -1;
        }
        .fire {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 200px; height: 300px;
            background: radial-gradient(ellipse at center, rgba(255,120,0,0.9) 0%, rgba(255,80,0,0.7) 20%, transparent 80%);
            border-radius: 50% 50% 40% 40%; animation: flicker 2s infinite alternate; filter: blur(5px);
        }
        .logs { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 250px; height: 80px; }
        .log { position: absolute; width: 200px; height: 30px; background: linear-gradient(to right, #5d4037, #3e2723); border-radius: 5px; }
        .log-1 { transform: rotate(45deg); top: 30px; left: 10px; }
        .log-2 { transform: rotate(-45deg); top: 30px; right: 10px; }
        .log-3 { width: 180px; top: 50px; left: 35px; }
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; }
        .star { position: absolute; background-color: white; border-radius: 50%; animation: twinkle var(--duration) infinite alternate; }
        .main-content {
            text-align: center; max-width: 800px; padding: 40px;
            background: rgba(10, 15, 28, 0.7); backdrop-filter: blur(10px);
            border-radius: 30px; border: 1px solid rgba(255, 100, 0, 0.3);
            box-shadow: 0 20px 50px rgba(255, 80, 0, 0.2); z-index: 10;
        }
        .title {
            font-size: 3.5rem; margin-bottom: 20px;
            background: linear-gradient(to left, #ff9500, #ff3300);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            font-weight: 800;
        }
        .subtitle { font-size: 1.5rem; margin-bottom: 40px; color: rgba(255, 255, 255, 0.9); }
        .highlight { color: #ff9500; font-weight: 700; }
        .activities { display: flex; justify-content: center; flex-wrap: wrap; gap: 30px; margin: 40px 0; }
        .activity { display: flex; flex-direction: column; align-items: center; width: 110px; }
        .activity-icon {
            width: 70px; height: 70px; background: rgba(255, 100, 0, 0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin-bottom: 10px; font-size: 1.8rem; color: #ff9500; border: 2px solid rgba(255, 100, 0, 0.5);
        }
        .whatsapp-btn {
            display: inline-flex; align-items: center;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white; text-decoration: none; padding: 20px 45px;
            border-radius: 50px; font-size: 1.4rem; font-weight: 700;
            transition: 0.3s; box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
        }
        .whatsapp-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(37, 211, 102, 0.6); }
        .whatsapp-btn i { margin-left: 12px; font-size: 1.7rem; }
        @keyframes flicker { 0% { opacity: 0.8; transform: translateX(-50%) scale(1); } 100% { opacity: 1; transform: translateX(-50%) scale(1.05); } }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }
        @media (max-width: 768px) { .title { font-size: 2.2rem; } .subtitle { font-size: 1.1rem; } }
    </style>
</head>
<body>

    <div class="party-container">
        <div class="stars" id="stars"></div>
        <div class="fire-background"></div>
        <div class="campfire"><div class="fire"></div><div class="logs"><div class="log log-1"></div><div class="log log-2"></div><div class="log log-3"></div></div></div>

        <div class="main-content">
            <h1 class="title">הצטרפו למסע של מפגשים</h1>
            <p class="subtitle">הכירו חברים חדשים ב<span class="highlight">מסיבות מדבר</span> ו<span class="highlight">פעילויות חוץ</span></p>
            
            <div class="activities">
                <div class="activity"><div class="activity-icon"><i class="fas fa-fire"></i></div><div class="activity-name">מדורות</div></div>
                <div class="activity"><div class="activity-icon"><i class="fas fa-hiking"></i></div><div class="activity-name">טיולים</div></div>
                <div class="activity"><div class="activity-icon"><i class="fas fa-umbrella-beach"></i></div><div class="activity-name">חוף</div></div>
                <div class="activity"><div class="activity-icon"><i class="fas fa-caravan"></i></div><div class="activity-name">קמפינג</div></div>
            </div>

            <div class="whatsapp-btn-container">
                <a href="https://wa.me/8613184785260?text=%D7%A9%D7%9C%D7%95%D7%9D" class="whatsapp-btn" id="whatsappBtn" target="_blank">
                    <i class="fab fa-whatsapp"></i>
                    שלחו לנו הודעה בוואטסאפ
                </a>
            </div>
            
            <p style="margin-top:20px; font-size: 0.9rem; opacity: 0.8;">הרפתקאות חדשות מחכות לכם!</p>
        </div>
    </div>

    <script>
        // تتبع تيك توك عند الضغط
        document.getElementById('whatsappBtn').addEventListener('click', function() {
            if (typeof ttq !== 'undefined') {
                ttq.track('Contact', {
                    content_name: 'whatsapp_contact',
                    value: 0,
                    currency: 'USD'
                });
            }
        });

        // إنشاء النجوم
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
